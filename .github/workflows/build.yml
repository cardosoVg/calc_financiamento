name: Gerar EXE Windows

on: [push] # Roda toda vez que você enviar código

jobs:
  build:
    runs-on: windows-latest # Aqui está a mágica: ele usa um Windows real

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Gerar Executável
      run: pyinstaller --onefile --windowed --name "SimuladorImobiliario" financiamento3.py
      # SUBSTITUA "seu_arquivo.py" pelo nome real do seu script

    - name: Upload do Resultado
      uses: actions/upload-artifact@v4
      with:
        name: Simulador-Windows
        path: dist/SimuladorImobiliario.exe
